<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Icon Generator</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background-color: #fff; }
        .icon { margin: 20px; }
    </style>
</head>
<body>
    <h1>Generate PWA Icons for TaskHive</h1>
    <div class="icons">
        <img class="icon" id="icon192" src="#" alt="192x192 Icon" width="192" height="192">
        <img class="icon" id="icon512" src="#" alt="512x512 Icon" width="512" height="512">
        <img class="icon" id="icon180" src="#" alt="180x180 Icon" width="180" height="180">
    </div>
    <button onclick="generateIcons()">Generate Icons</button>

    <script>
        function generateIcons() {
            const colors = '#F59E0B';
            const sizes = [192, 512, 180];
            sizes.forEach(size => {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');

                // Draw honey gold background
                ctx.fillStyle = colors;
                ctx.fillRect(0, 0, size, size);

                // Draw a simple queen bee logo shape (placeholder)
                ctx.beginPath();
                ctx.moveTo(size / 2, size / 4);
                ctx.lineTo(size / 4, size * 3 / 4);
                ctx.lineTo(size * 3 / 4, size * 3 / 4);
                ctx.closePath();
                ctx.fillStyle = 'black';
                ctx.fill();

                const dataUrl = canvas.toDataURL('image/png');
                document.getElementById(`icon${size}`).src = dataUrl;
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = `TaskHive_Icon_${size}x${size}.png`;
                link.innerText = `Download ${size}x${size} Icon`;
                document.body.appendChild(link);
            });
        }
    </script>
</body>
</html>
